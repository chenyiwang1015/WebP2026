<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Lab9 Photo Wall</title>
    
    <style>
        .gallery {
            --g: 6px; 
            display: grid;
            width: 800px;
            aspect-ratio: 1;
            grid: auto-flow 1fr/repeat(3,1fr);
            gap: var(--g);
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            cursor: pointer;
            transition: .5s;
        }

        .gallery img:hover {
            filter: grayscale(0%);
        }
        .gallery img:nth-child(2) {
            grid-area: 1/2/span 2/span 2;
            clip-path: polygon(0 0,100% 0,100% 100%,calc(50% + var(--g)/4) 100%,0 calc(50% - var(--g)/4));
        }
        .gallery img:nth-child(3) {
            grid-area: 2/1/span 2/span 2;
            clip-path: polygon(0 0,calc(50% - var(--g)/4) 0,100% calc(50% + var(--g)/4),100% 100%,0 100%);
        }
    </style>
</head>

<body>

    <button onclick="getimg()">Get IMG</button>
    
    <div id="gallery" class="gallery"></div>

    <script>
        var imglist_Url = 'https://api.flickr.com/services/rest/?method=flickr.photos.getRecent&api_key=ca370d51a054836007519a00ff4ce59e&per_page=10&format=json&nojsoncallback=1';

        function getimg() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', imglist_Url, true);
            xhr.send();
            xhr.onload = function() {
                var data = JSON.parse(this.responseText);
                add_new_img(data.photos.photo);
            };
        }

        function add_new_img(dataset) {
            var gallery = document.getElementById('gallery');
            gallery.innerHTML = ''; 
            for (var i = 0; i < dataset.length; i++) {
                var item = dataset[i];
                // 組合 Flickr 圖片網址
                var imgUrl = 'https://live.staticflickr.com/' + item.server + '/' + item.id + '_' + item.secret + '_q.jpg';
                
                var imgTag = document.createElement('img');
                imgTag.src = imgUrl;
                gallery.appendChild(imgTag);
            }
        }
    </script>

</body>
</html>
