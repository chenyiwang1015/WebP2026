<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>資工選課表 - HW2</title>
    <style>
        table { font-family: Arial, Helvetica, sans-serif; border-collapse: collapse; width: 100%; }
        td, th { border: 1px solid #ddd; padding: 6px; }
        tr:nth-child(even){background-color: #f2f2f2;}
        tr:hover {background-color: #ddd;}
        th { padding-top: 12px; padding-bottom: 12px; text-align: left; background-color: #04AA6D; color: white; }
        
        .course-link { color: blue; text-decoration: underline; cursor: pointer; }

        #myModal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            max-width: 800px;
            height: 80vh; 
            overflow-y: auto; 
            background-color: white;
            border: 2px solid #04AA6D;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 9999;
        }
        
        .modal-header {
            background-color: #04AA6D;
            padding: 10px;
            text-align: right;
            position: sticky; 
            top: 0;
        }
        .modal-header button { cursor: pointer; padding: 5px 10px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>資工選課表</h2>

    <table id="csie">
        <tr>
            <th>開課單位</th>
            <th>課程名稱</th>
            <th>授課教師</th>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2337')">物件導向軟體設計</span></td>
            <td>黃崇源</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2341')">	平行程式設計</span></td>
            <td>李春良</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2338')">作業系統實務</span></td>
            <td>張哲維</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2343')">編譯器設計</span></td>
            <td>吳齊人</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2339')">通訊系統</span></td>
            <td>陳仁暉</td>
        </tr>
        <tr>
            <td>資工系</td>
            <td><span class="course-link" onclick="openModal('A2340')">軟硬體專題(2)</span></td>
            <td>魏志達</td>
        </tr>
    </table>

    <br>
    <button onclick="changeResult()">Change</button>

    <div id="myModal">
        <div class="modal-header">
            <button onclick="closeModal()">關閉 X</button>
        </div>
        <iframe id="courseIframe" src="" style="width:100%; height:800px; border:none;"></iframe>
    </div>

    <script>
        function changeResult() { 
            document.getElementById("csie").rows[1].cells[2].innerHTML = "李春良"; 
        }
        
        function openModal(sectionId) { 
            document.getElementById("courseIframe").src = "https://catalog.cgu.edu.tw/coursedata?sectionid=" + sectionId;
            document.getElementById("myModal").style.display = "block"; 
        }
        
        function closeModal() { 
            document.getElementById("myModal").style.display = "none"; 
            document.getElementById("courseIframe").src = "";
        }
    </script>

</body>
</html>
